server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Handle React Router (SPA)
    # index.html itself MUST NEVER be cached — it's the entry point that
    # references content-hashed JS/CSS bundles. If the browser caches the old
    # index.html, users will keep loading old app versions after a deploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # Same for service worker — prevent stale installations
    location = /service-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        expires 0;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (content-hashed filenames → safe to cache forever)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve .mjs files with correct MIME type
    location ~* \.mjs$ {
        default_type application/javascript;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://s3.tradingview.com https://*.tradingview.com https://challenges.cloudflare.com https://*.sumsub.com https://connect.trezor.io https://cdn.jsdelivr.net; worker-src 'self' blob: https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.kbex.io https://api.binance.com https://*.binance.com wss://stream.binance.com:9443 wss://stream.binance.com wss://*.binance.com https://*.tradingview.com https://challenges.cloudflare.com https://*.sumsub.com https://connect.trezor.io https://cdn.jsdelivr.net; frame-src https://*.tradingview.com https://s.tradingview.com https://challenges.cloudflare.com https://*.sumsub.com https://in.sumsub.com https://connect.trezor.io; object-src 'none'; base-uri 'self';" always;
}
